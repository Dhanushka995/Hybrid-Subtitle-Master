name: Build Hybrid Subtitle Master
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller google-generativeai openai requests deep-translator

    - name: Build Windows EXE
      run: |
        pyinstaller --onefile --noconsole --name "Hybrid_Sub_Master" app.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Hybrid_Subtitle_Software
        path: dist/Hybrid_Sub_Master.exe
